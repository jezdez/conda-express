name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          cache: true

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: pixi run build

      - name: Test
        run: pixi run test

      - name: Stage binary and compute checksums
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN_NAME="cx.exe"
            ASSET_NAME="cx-${TARGET}.exe"
          else
            BIN_NAME="cx"
            ASSET_NAME="cx-${TARGET}"
          fi
          cp "target/release/${BIN_NAME}" "${ASSET_NAME}"
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.ASSET_NAME }}
          path: |
            ${{ env.ASSET_NAME }}
            ${{ env.ASSET_NAME }}.sha256
          retention-days: 1

  build-wheels:
    name: Wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: "2_17"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            manylinux: "2_17"
          - target: x86_64-apple-darwin
            os: macos-15-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}-wheel

      - uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --locked -o dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: sdist
          args: -o dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-binaries]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: cx-*
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" artifacts/* --clobber

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [upload-release-assets]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "$TAG_NAME" --pattern "cx-${target}.sha256" --dir checksums
          done

      - name: Update formula
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          VERSION="${TAG_NAME#v}"
          FORMULA="Formula/cx.rb"

          read_sha() { awk '{print $1}' "checksums/cx-${1}.sha256"; }

          export CX_VERSION="$VERSION"
          export CX_FORMULA="$FORMULA"
          export CX_SHA_MACOS_ARM="$(read_sha aarch64-apple-darwin)"
          export CX_SHA_MACOS_INTEL="$(read_sha x86_64-apple-darwin)"
          export CX_SHA_LINUX_ARM="$(read_sha aarch64-unknown-linux-gnu)"
          export CX_SHA_LINUX_INTEL="$(read_sha x86_64-unknown-linux-gnu)"

          python3 << 'PYEOF'
          import os

          version = os.environ["CX_VERSION"]
          formula = os.environ["CX_FORMULA"]
          shas = {
              "aarch64-apple-darwin": os.environ["CX_SHA_MACOS_ARM"],
              "x86_64-apple-darwin": os.environ["CX_SHA_MACOS_INTEL"],
              "aarch64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_ARM"],
              "x86_64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_INTEL"],
          }

          with open(formula) as f:
              lines = f.readlines()

          out = []
          for i, line in enumerate(lines):
              if line.strip().startswith('version "'):
                  out.append(f'  version "{version}"\n')
              elif line.strip().startswith('sha256 "') and i > 0:
                  replaced = False
                  for target, sha in shas.items():
                      if target in lines[i - 1]:
                          indent = line[: len(line) - len(line.lstrip())]
                          out.append(f'{indent}sha256 "{sha}"\n')
                          replaced = True
                          break
                  if not replaced:
                      out.append(line)
              else:
                  out.append(line)

          with open(formula, "w") as f:
              f.writelines(out)
          PYEOF

          echo "Updated $FORMULA to version $VERSION"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cx.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Homebrew formula to ${GITHUB_REF_NAME}"
          git push

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: "{wheel-*,sdist}"
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist/

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-binaries]
    environment: crates-io
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          cache: true

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3
        id: crates-auth

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: pixi run cargo publish --locked --no-verify
