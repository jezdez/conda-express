name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      major-minor: ${{ steps.release.outputs.major-minor }}
    steps:
      - name: Validate release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.]post[0-9]+)?$ ]]; then
            echo "Invalid release tag: ${RELEASE_TAG}" >&2
            echo "Use a version tag such as 26.5.2 or 26.5.2.post1." >&2
            exit 1
          fi

          version="${RELEASE_TAG}"
          major_minor="$(printf '%s\n' "$version" | awk -F. '{ print $1 "." $2 }')"
          if [ -z "$major_minor" ] || [ "$major_minor" = "." ]; then
            echo "Could not derive major.minor from ${RELEASE_TAG}" >&2
            exit 1
          fi

          {
            echo "tag=${RELEASE_TAG}"
            echo "version=${version}"
            echo "major-minor=${major_minor}"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Verify package version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          PYPROJECT_VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$PYPROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "pyproject.toml version $PYPROJECT_VERSION does not match release tag $RELEASE_VERSION" >&2
            exit 1
          fi

  build-binaries:
    name: Build ${{ matrix.variant }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [validate-release]
    permissions:
      contents: read
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for release assets
      artifact-metadata: write # create artifact storage records for attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cx
            layout: online
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cx
            layout: online
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cx
            layout: online
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cx
            layout: online
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cx
            layout: online
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cxz
            layout: embedded
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cxz
            layout: embedded
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cxz
            layout: embedded
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cxz
            layout: embedded
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cxz
            layout: embedded

    steps:
      - name: Verify matrix target
        shell: bash
        env:
          RUNNER_ARCH_NAME: ${{ runner.arch }}
          RUNNER_OS_NAME: ${{ runner.os }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          case "${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" in
            Linux/X64) host="x86_64-unknown-linux-gnu" ;;
            Linux/ARM64) host="aarch64-unknown-linux-gnu" ;;
            macOS/X64) host="x86_64-apple-darwin" ;;
            macOS/ARM64) host="aarch64-apple-darwin" ;;
            Windows/X64) host="x86_64-pc-windows-msvc" ;;
            *)
              echo "Unsupported runner platform: ${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" >&2
              exit 1
              ;;
          esac
          if [ "$host" != "$TARGET" ]; then
            echo "Expected matrix target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ needs.validate-release.outputs.tag }}
          persist-credentials: false

      - name: Build ${{ matrix.variant }}
        id: build
        uses: jezdez/conda-ship@0.1.0 # zizmor: ignore[unpinned-uses] conda-ship immutable releases keep the action and assets aligned.
        with:
          layout: ${{ matrix.layout }}

      - name: Smoke test ${{ matrix.variant }} release binary
        shell: bash
        env:
          BINARY_PATH: ${{ steps.build.outputs.binary-path }}
          EXPECTED_RUNTIME: ${{ matrix.variant }}
          SMOKE_PREFIX: ${{ runner.temp }}/${{ matrix.variant }}-smoke
        run: |
          EXPECTED_VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -n1)"
          ACTUAL_VERSION="$("$BINARY_PATH" --version)"
          if [ "$ACTUAL_VERSION" != "$EXPECTED_RUNTIME $EXPECTED_VERSION" ]; then
            echo "expected $EXPECTED_RUNTIME $EXPECTED_VERSION, got $ACTUAL_VERSION" >&2
            exit 1
          fi
          "$BINARY_PATH" --path "$SMOKE_PREFIX" bootstrap
          "$BINARY_PATH" --path "$SMOKE_PREFIX" status
          "$BINARY_PATH" --path "$SMOKE_PREFIX" completion --help | grep -q "Generate and install shell tab completions"

      - name: Attest ${{ matrix.variant }} release binary
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.build.outputs.dist-path }}/*

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: ${{ steps.build.outputs.dist-path }}/*
          retention-days: 1

  build-wheels:
    name: Wheel (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [validate-release, build-binaries]
    permissions:
      contents: read
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for wheel artifacts
      artifact-metadata: write # create artifact storage records for attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: cx-x86_64-unknown-linux-gnu
            platform-tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          - target: aarch64-unknown-linux-gnu
            asset: cx-aarch64-unknown-linux-gnu
            platform-tag: manylinux_2_17_aarch64.manylinux2014_aarch64
          - target: x86_64-apple-darwin
            asset: cx-x86_64-apple-darwin
            platform-tag: macosx_10_12_x86_64
          - target: aarch64-apple-darwin
            asset: cx-aarch64-apple-darwin
            platform-tag: macosx_11_0_arm64
          - target: x86_64-pc-windows-msvc
            asset: cx-x86_64-pc-windows-msvc.exe
            platform-tag: win_amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ needs.validate-release.outputs.tag }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.asset }}
          path: binary-artifact

      - name: Verify package version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          PYPROJECT_VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$PYPROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "pyproject.toml version $PYPROJECT_VERSION does not match release tag $RELEASE_VERSION" >&2
            exit 1
          fi

      - name: Build wheel from conda-ship-built binary
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}
          PLATFORM_TAG: ${{ matrix.platform-tag }}
        run: |
          mkdir -p python/conda_express/bin
          if [[ "$ASSET_NAME" == *.exe ]]; then
            cp "binary-artifact/${ASSET_NAME}" python/conda_express/bin/cx.exe
          else
            cp "binary-artifact/${ASSET_NAME}" python/conda_express/bin/cx
          fi
          chmod +x python/conda_express/bin/cx*
          python3 -m pip wheel --no-deps --wheel-dir dist . \
            --config-settings=--build-option=--plat-name \
            --config-settings=--build-option="${PLATFORM_TAG}"

      - name: Attest wheel
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*.whl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: [validate-release, build-binaries, build-wheels]
    permissions:
      contents: write # create the immutable GitHub release for this tag
    steps:
      - name: Download cx artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "cx-*"
          merge-multiple: true

      - name: Download cxz artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "cxz-*"
          merge-multiple: true

      - name: Publish assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(artifacts/*)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists." >&2
            echo "Release immutability is enabled; create a new tag instead of replacing assets." >&2
            exit 1
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" \
            --draft \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes "conda-express ${RELEASE_TAG}"

          cleanup_draft() {
            gh release delete "$RELEASE_TAG" --yes >/dev/null 2>&1 || true
          }
          trap cleanup_draft ERR

          gh release upload "$RELEASE_TAG" "${files[@]}"
          gh release edit "$RELEASE_TAG" --draft=false

          trap - ERR

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [validate-release, github-release]
    permissions:
      contents: write # commit the generated Homebrew formula update back to main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "$RELEASE_TAG" --pattern "cx-${target}.sha256" --dir checksums
          done

      - name: Update formula
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        shell: bash
        run: |
          VERSION="${RELEASE_TAG}"
          FORMULA="Formula/cx.rb"

          # Tags omit the "v" prefix; GitHub asset URLs are .../releases/download/<tag>/...
          sed -i 's|releases/download/v#{version}|releases/download/#{version}|g' "$FORMULA"

          read_sha() { awk '{print $1}' "checksums/cx-${1}.sha256"; }

          export CX_VERSION="$VERSION"
          export CX_FORMULA="$FORMULA"
          CX_SHA_MACOS_ARM="$(read_sha aarch64-apple-darwin)"
          CX_SHA_MACOS_INTEL="$(read_sha x86_64-apple-darwin)"
          CX_SHA_LINUX_ARM="$(read_sha aarch64-unknown-linux-gnu)"
          CX_SHA_LINUX_INTEL="$(read_sha x86_64-unknown-linux-gnu)"
          export CX_SHA_MACOS_ARM
          export CX_SHA_MACOS_INTEL
          export CX_SHA_LINUX_ARM
          export CX_SHA_LINUX_INTEL

          python3 << 'PYEOF'
          import os

          version = os.environ["CX_VERSION"]
          formula = os.environ["CX_FORMULA"]
          shas = {
              "aarch64-apple-darwin": os.environ["CX_SHA_MACOS_ARM"],
              "x86_64-apple-darwin": os.environ["CX_SHA_MACOS_INTEL"],
              "aarch64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_ARM"],
              "x86_64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_INTEL"],
          }

          with open(formula) as f:
              lines = f.readlines()

          out = []
          for i, line in enumerate(lines):
              if line.strip().startswith('version "'):
                  out.append(f'  version "{version}"\n')
              elif line.strip().startswith('sha256 "') and i > 0:
                  replaced = False
                  for target, sha in shas.items():
                      if target in lines[i - 1]:
                          indent = line[: len(line) - len(line.lstrip())]
                          out.append(f'{indent}sha256 "{sha}"\n')
                          replaced = True
                          break
                  if not replaced:
                      out.append(line)
              else:
                  out.append(line)

          with open(formula, "w") as f:
              f.writelines(out)
          PYEOF

          echo "Updated $FORMULA to version $VERSION"
          cat "$FORMULA"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cx.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Homebrew formula to ${RELEASE_TAG}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [github-release, build-wheels]
    environment: pypi
    permissions:
      contents: read
      id-token: write # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: "wheel-*"
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  docker-images:
    name: Docker ${{ matrix.variant }} images
    runs-on: ubuntu-latest
    needs: [validate-release, github-release, build-binaries]
    permissions:
      contents: read
      packages: write # push versioned container images to GHCR
      id-token: write # required for artifact attestation
      attestations: write # publish provenance for the pushed image
      artifact-metadata: write # create artifact storage records for attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cx
            dockerfile: docker/Dockerfile
            tag-suffix: ""
            latest-tag: latest
          - variant: cxz
            dockerfile: docker/Dockerfile.cxz
            tag-suffix: "-cxz"
            latest-tag: latest-cxz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ needs.validate-release.outputs.tag }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: docker/binaries
          pattern: ${{ matrix.variant }}-*-unknown-linux-*
          merge-multiple: true

      - name: Prepare binaries for buildx
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          cp "docker/binaries/${VARIANT}-x86_64-unknown-linux-gnu" "docker/${VARIANT}-linux-amd64"
          cp "docker/binaries/${VARIANT}-aarch64-unknown-linux-gnu" "docker/${VARIANT}-linux-arm64"
          chmod +x "docker/${VARIANT}-linux-amd64" "docker/${VARIANT}-linux-arm64"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Smoke test
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          SMOKE_TAG: ${{ matrix.variant }}-smoke-test
          VARIANT: ${{ matrix.variant }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f "$DOCKERFILE" \
            -t "$SMOKE_TAG" \
            docker/
          if [ "$VARIANT" = "cxz" ]; then
            docker run --rm "$SMOKE_TAG" status
          else
            docker run --rm "$SMOKE_TAG" --help
            docker run --rm "$SMOKE_TAG" --version
          fi

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.validate-release.outputs.version }}${{ matrix.tag-suffix }}
            type=raw,value=${{ needs.validate-release.outputs.major-minor }}${{ matrix.tag-suffix }}
            type=raw,value=${{ matrix.latest-tag }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: build
        with:
          context: docker
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: 1
          severity: CRITICAL
