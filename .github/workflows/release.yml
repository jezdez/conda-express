name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: prefix-dev/setup-pixi@82d477f15f3a381dbcc8adc1206ce643fe110fb7 # v0.9.3
        with:
          cache: true

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: pixi run build

      - name: Test
        run: pixi run test

      - name: Stage binary and compute checksums
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN_NAME="cx.exe"
            ASSET_NAME="cx-${TARGET}.exe"
          else
            BIN_NAME="cx"
            ASSET_NAME="cx-${TARGET}"
          fi
          cp "target/release/${BIN_NAME}" "${ASSET_NAME}"
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.ASSET_NAME }}
          path: |
            ${{ env.ASSET_NAME }}
            ${{ env.ASSET_NAME }}.sha256
          retention-days: 1

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" artifacts/* --title "$TAG_NAME" --generate-notes
