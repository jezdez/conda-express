name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: pixi run build

      - name: Test
        run: pixi run test

      - name: Stage binary and compute checksums
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN_NAME="cx.exe"
            ASSET_NAME="cx-${TARGET}.exe"
          else
            BIN_NAME="cx"
            ASSET_NAME="cx-${TARGET}"
          fi
          cp "target/release/${BIN_NAME}" "${ASSET_NAME}"
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ASSET_NAME }}
          path: |
            ${{ env.ASSET_NAME }}
            ${{ env.ASSET_NAME }}.sha256
          retention-days: 1

  build-cxz-binaries:
    name: Build cxz (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}-cxz

      - name: Build cxz (embedded payload)
        env:
          CX_EMBED_PAYLOAD: "1"
        run: pixi run build

      - name: Stage binary and compute checksums
        shell: bash
        run: |
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN_NAME="cx.exe"
            ASSET_NAME="cxz-${TARGET}.exe"
          else
            BIN_NAME="cx"
            ASSET_NAME="cxz-${TARGET}"
          fi
          cp "target/release/${BIN_NAME}" "${ASSET_NAME}"
          sha256sum "${ASSET_NAME}" > "${ASSET_NAME}.sha256"
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ASSET_NAME }}
          path: |
            ${{ env.ASSET_NAME }}
            ${{ env.ASSET_NAME }}.sha256
          retention-days: 1

  build-wheels:
    name: Wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: "2_17"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            manylinux: "2_17"
          - target: x86_64-apple-darwin
            os: macos-15-large
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}-wheel

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --locked -o dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: -o dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-binaries, build-cxz-binaries]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "{cx-*,cxz-*}"
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" artifacts/* --clobber

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [upload-release-assets]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "$TAG_NAME" --pattern "cx-${target}.sha256" --dir checksums
          done

      - name: Update formula
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          VERSION="${TAG_NAME#v}"
          FORMULA="Formula/cx.rb"

          # Tags omit the "v" prefix; GitHub asset URLs are .../releases/download/<tag>/...
          sed -i 's|releases/download/v#{version}|releases/download/#{version}|g' "$FORMULA"

          read_sha() { awk '{print $1}' "checksums/cx-${1}.sha256"; }

          export CX_VERSION="$VERSION"
          export CX_FORMULA="$FORMULA"
          export CX_SHA_MACOS_ARM="$(read_sha aarch64-apple-darwin)"
          export CX_SHA_MACOS_INTEL="$(read_sha x86_64-apple-darwin)"
          export CX_SHA_LINUX_ARM="$(read_sha aarch64-unknown-linux-gnu)"
          export CX_SHA_LINUX_INTEL="$(read_sha x86_64-unknown-linux-gnu)"

          python3 << 'PYEOF'
          import os

          version = os.environ["CX_VERSION"]
          formula = os.environ["CX_FORMULA"]
          shas = {
              "aarch64-apple-darwin": os.environ["CX_SHA_MACOS_ARM"],
              "x86_64-apple-darwin": os.environ["CX_SHA_MACOS_INTEL"],
              "aarch64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_ARM"],
              "x86_64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_INTEL"],
          }

          with open(formula) as f:
              lines = f.readlines()

          out = []
          for i, line in enumerate(lines):
              if line.strip().startswith('version "'):
                  out.append(f'  version "{version}"\n')
              elif line.strip().startswith('sha256 "') and i > 0:
                  replaced = False
                  for target, sha in shas.items():
                      if target in lines[i - 1]:
                          indent = line[: len(line) - len(line.lstrip())]
                          out.append(f'{indent}sha256 "{sha}"\n')
                          replaced = True
                          break
                  if not replaced:
                      out.append(line)
              else:
                  out.append(line)

          with open(formula, "w") as f:
              f.writelines(out)
          PYEOF

          echo "Updated $FORMULA to version $VERSION"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cx.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Homebrew formula to ${GITHUB_REF_NAME}"
          git push

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: "{wheel-*,sdist}"
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-binaries]
    environment: crates-io
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          cache: true

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: crates-auth

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: pixi run cargo publish --locked --no-verify

  docker-images:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: docker/binaries
          pattern: cx-*-unknown-linux-*
          merge-multiple: true

      - name: Prepare binaries for buildx
        run: |
          cp docker/binaries/cx-x86_64-unknown-linux-gnu docker/cx-linux-amd64
          cp docker/binaries/cx-aarch64-unknown-linux-gnu docker/cx-linux-arm64
          chmod +x docker/cx-linux-*

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Smoke test
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t cx-smoke-test \
            docker/
          docker run --rm cx-smoke-test --help
          docker run --rm cx-smoke-test --version

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: 1
          severity: CRITICAL

  docker-cxz-images:
    name: Docker cxz images
    runs-on: ubuntu-latest
    needs: [build-cxz-binaries]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: docker/binaries
          pattern: cxz-*-unknown-linux-*
          merge-multiple: true

      - name: Prepare binaries for buildx
        run: |
          cp docker/binaries/cxz-x86_64-unknown-linux-gnu docker/cxz-linux-amd64
          cp docker/binaries/cxz-aarch64-unknown-linux-gnu docker/cxz-linux-arm64
          chmod +x docker/cxz-linux-*

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Smoke test
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f docker/Dockerfile.cxz \
            -t cxz-smoke-test \
            docker/
          docker run --rm cxz-smoke-test status

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}-cxz
            type=semver,pattern={{major}}.{{minor}}-cxz
            type=raw,value=latest-cxz

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: docker
          file: docker/Dockerfile.cxz
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
