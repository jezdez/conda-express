name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for release assets
      artifact-metadata: write # create artifact storage records for attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build release binary
        id: build
        uses: jezdez/conda-pronto@0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
        with:
          name: cx
          packages: "python >=3.12, conda >=25.1, conda-rattler-solver, conda-spawn >=0.1.0, conda-completion >=0.2.0, conda-pypi, conda-self, conda-global, conda-workspaces >=0.4.0"
          channels: "conda-forge"
          exclude: "conda-libmamba-solver"
          ref: 0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
          embed-bundle: "false"
          docs-url: "https://jezdez.github.io/conda-express/"

      - name: Attest release binary
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}
          retention-days: 1

  build-cxz-binaries:
    name: Build cxz (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for release assets
      artifact-metadata: write # create artifact storage records for attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build cxz
        id: build
        uses: jezdez/conda-pronto@0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
        with:
          name: cx
          packages: "python >=3.12, conda >=25.1, conda-rattler-solver, conda-spawn >=0.1.0, conda-completion >=0.2.0, conda-pypi, conda-self, conda-global, conda-workspaces >=0.4.0"
          channels: "conda-forge"
          exclude: "conda-libmamba-solver"
          ref: 0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
          embed-bundle: "true"
          docs-url: "https://jezdez.github.io/conda-express/"

      - name: Attest cxz release binary
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}
          retention-days: 1

  build-wheels:
    name: Wheel (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: read
      id-token: write # mint the OIDC token required for artifact attestations
      attestations: write # publish provenance attestations for wheel artifacts
      artifact-metadata: write # create artifact storage records for attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset: cx-x86_64-unknown-linux-gnu
            platform-tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          - target: aarch64-unknown-linux-gnu
            asset: cx-aarch64-unknown-linux-gnu
            platform-tag: manylinux_2_17_aarch64.manylinux2014_aarch64
          - target: x86_64-apple-darwin
            asset: cx-x86_64-apple-darwin
            platform-tag: macosx_10_12_x86_64
          - target: aarch64-apple-darwin
            asset: cx-aarch64-apple-darwin
            platform-tag: macosx_11_0_arm64
          - target: x86_64-pc-windows-msvc
            asset: cx-x86_64-pc-windows-msvc.exe
            platform-tag: win_amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.asset }}
          path: binary-artifact

      - name: Verify package version
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          PYPROJECT_VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$PYPROJECT_VERSION" != "$VERSION" ]; then
            echo "pyproject.toml version $PYPROJECT_VERSION does not match release tag $VERSION" >&2
            exit 1
          fi

      - name: Build wheel from conda-pronto binary
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}
          PLATFORM_TAG: ${{ matrix.platform-tag }}
        run: |
          mkdir -p python/conda_express/bin
          if [[ "$ASSET_NAME" == *.exe ]]; then
            cp "binary-artifact/${ASSET_NAME}" python/conda_express/bin/cx.exe
          else
            cp "binary-artifact/${ASSET_NAME}" python/conda_express/bin/cx
          fi
          chmod +x python/conda_express/bin/cx*
          python3 -m pip wheel --no-deps --wheel-dir dist . \
            --config-settings=--build-option=--plat-name \
            --config-settings=--build-option="${PLATFORM_TAG}"

      - name: Attest wheel
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/*.whl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  upload-release-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: [build-binaries, build-cxz-binaries]
    permissions:
      contents: write # upload binaries, checksums, locks, and package manifests
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "{cx-*,cxz-*}"
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" artifacts/* --clobber

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [upload-release-assets]
    permissions:
      contents: write # commit the generated Homebrew formula update back to main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "$TAG_NAME" --pattern "cx-${target}.sha256" --dir checksums
          done

      - name: Update formula
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          VERSION="${TAG_NAME#v}"
          FORMULA="Formula/cx.rb"

          # Tags omit the "v" prefix; GitHub asset URLs are .../releases/download/<tag>/...
          sed -i 's|releases/download/v#{version}|releases/download/#{version}|g' "$FORMULA"

          read_sha() { awk '{print $1}' "checksums/cx-${1}.sha256"; }

          export CX_VERSION="$VERSION"
          export CX_FORMULA="$FORMULA"
          export CX_SHA_MACOS_ARM="$(read_sha aarch64-apple-darwin)"
          export CX_SHA_MACOS_INTEL="$(read_sha x86_64-apple-darwin)"
          export CX_SHA_LINUX_ARM="$(read_sha aarch64-unknown-linux-gnu)"
          export CX_SHA_LINUX_INTEL="$(read_sha x86_64-unknown-linux-gnu)"

          python3 << 'PYEOF'
          import os

          version = os.environ["CX_VERSION"]
          formula = os.environ["CX_FORMULA"]
          shas = {
              "aarch64-apple-darwin": os.environ["CX_SHA_MACOS_ARM"],
              "x86_64-apple-darwin": os.environ["CX_SHA_MACOS_INTEL"],
              "aarch64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_ARM"],
              "x86_64-unknown-linux-gnu": os.environ["CX_SHA_LINUX_INTEL"],
          }

          with open(formula) as f:
              lines = f.readlines()

          out = []
          for i, line in enumerate(lines):
              if line.strip().startswith('version "'):
                  out.append(f'  version "{version}"\n')
              elif line.strip().startswith('sha256 "') and i > 0:
                  replaced = False
                  for target, sha in shas.items():
                      if target in lines[i - 1]:
                          indent = line[: len(line) - len(line.lstrip())]
                          out.append(f'{indent}sha256 "{sha}"\n')
                          replaced = True
                          break
                  if not replaced:
                      out.append(line)
              else:
                  out.append(line)

          with open(formula, "w") as f:
              f.writelines(out)
          PYEOF

          echo "Updated $FORMULA to version $VERSION"
          cat "$FORMULA"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cx.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update Homebrew formula to ${GITHUB_REF_NAME}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    environment: pypi
    permissions:
      contents: read
      id-token: write # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: "wheel-*"
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [upload-release-assets]
    environment: crates-io
    permissions:
      contents: read
      id-token: write # required for crates.io trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify crate release metadata
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          CRATE_VERSION="$(cargo metadata --no-deps --format-version=1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$CRATE_VERSION" != "$VERSION" ]; then
            echo "Cargo.toml version $CRATE_VERSION does not match release tag $VERSION" >&2
            exit 1
          fi
          if ! grep -q "^${VERSION} " binary-sha256.txt; then
            echo "binary-sha256.txt has no checksums for $VERSION" >&2
            exit 1
          fi

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: crates-auth

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish --locked

  docker-images:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: read
      packages: write # push versioned container images to GHCR
      id-token: write # required for artifact attestation
      attestations: write # publish provenance for the pushed image
      artifact-metadata: write # create artifact storage records for attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: docker/binaries
          pattern: cx-*-unknown-linux-*
          merge-multiple: true

      - name: Prepare binaries for buildx
        run: |
          cp docker/binaries/cx-x86_64-unknown-linux-gnu docker/cx-linux-amd64
          cp docker/binaries/cx-aarch64-unknown-linux-gnu docker/cx-linux-arm64
          chmod +x docker/cx-linux-*

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Smoke test
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t cx-smoke-test \
            docker/
          docker run --rm cx-smoke-test --help
          docker run --rm cx-smoke-test --version

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: docker
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: 1
          severity: CRITICAL

  docker-cxz-images:
    name: Docker cxz images
    runs-on: ubuntu-latest
    needs: [build-cxz-binaries]
    permissions:
      contents: read
      packages: write # push versioned container images to GHCR
      id-token: write # required for artifact attestation
      attestations: write # publish provenance for the pushed image
      artifact-metadata: write # create artifact storage records for attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: docker/binaries
          pattern: cxz-*-unknown-linux-*
          merge-multiple: true

      - name: Prepare binaries for buildx
        run: |
          cp docker/binaries/cxz-x86_64-unknown-linux-gnu docker/cxz-linux-amd64
          cp docker/binaries/cxz-aarch64-unknown-linux-gnu docker/cxz-linux-arm64
          chmod +x docker/cxz-linux-*

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Smoke test
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f docker/Dockerfile.cxz \
            -t cxz-smoke-test \
            docker/
          docker run --rm cxz-smoke-test status

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}-cxz
            type=semver,pattern={{major}}.{{minor}}-cxz
            type=raw,value=latest-cxz

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: docker
          file: docker/Dockerfile.cxz
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
