name: Build custom cx

on:
  workflow_call:
    inputs:
      packages:
        description: >
          Comma-separated conda package specs to include in cx. Defaults to the
          conda-express distribution package set.
        required: false
        type: string
        default: ""
      channels:
        description: >
          Comma-separated conda channels. Defaults to the conda-express channel
          set.
        required: false
        type: string
        default: ""
      exclude:
        description: >
          Comma-separated packages to exclude from cx along with their exclusive
          dependencies. Defaults to the conda-express exclusions.
        required: false
        type: string
        default: ""
      pronto-ref:
        description: "Git ref of Pronto to use for the build."
        required: false
        type: string
        default: "c679dd6e25f3eb6e4ef6e13192b31b8f469708a7"
      retention-days:
        description: "Number of days to retain build artifacts."
        required: false
        type: number
        default: 7
      embed-bundle:
        description: >
          Embed package archives into the binary for offline bootstrap. The
          output binary uses the cxz artifact name.
        required: false
        type: string
        default: "false"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build cx
        id: build
        uses: ./
        with:
          packages: ${{ inputs.packages }}
          channels: ${{ inputs.channels }}
          exclude: ${{ inputs.exclude }}
          pronto-ref: ${{ inputs.pronto-ref }}
          embed-bundle: ${{ inputs.embed-bundle }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}
          retention-days: ${{ inputs.retention-days }}
