name: Prepare conda-express binaries

on:
  workflow_dispatch:
    inputs:
      retention-days:
        description: "Number of days to retain build artifacts."
        required: false
        type: number
        default: 7

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.variant }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cx
            artifact_layout: online
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cx
            artifact_layout: online
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cx
            artifact_layout: online
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cx
            artifact_layout: online
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cx
            artifact_layout: online
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cxz
            artifact_layout: embedded
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cxz
            artifact_layout: embedded
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cxz
            artifact_layout: embedded
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cxz
            artifact_layout: embedded
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cxz
            artifact_layout: embedded

    steps:
      - name: Verify matrix target
        shell: bash
        env:
          RUNNER_ARCH_NAME: ${{ runner.arch }}
          RUNNER_OS_NAME: ${{ runner.os }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          case "${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" in
            Linux/X64) host="x86_64-unknown-linux-gnu" ;;
            Linux/ARM64) host="aarch64-unknown-linux-gnu" ;;
            macOS/X64) host="x86_64-apple-darwin" ;;
            macOS/ARM64) host="aarch64-apple-darwin" ;;
            Windows/X64) host="x86_64-pc-windows-msvc" ;;
            *)
              echo "Unsupported runner platform: ${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" >&2
              exit 1
              ;;
          esac
          if [ "$host" != "$TARGET" ]; then
            echo "Expected matrix target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build ${{ matrix.variant }}
        id: build
        uses: jezdez/conda-ship@15cf30a3fbf79731704737ea563c22de74d63b41 # 0.4.0
        with:
          conda-ship-version: "0.4.0"
          artifact-layout: ${{ matrix.artifact_layout }}
          artifact-name: ${{ matrix.variant }}

      - name: Smoke test ${{ matrix.variant }}
        shell: bash
        env:
          BINARY_PATH: ${{ steps.build.outputs.binary-path }}
          EXPECTED_RUNTIME: ${{ matrix.variant }}
          SMOKE_PREFIX: ${{ runner.temp }}/${{ matrix.variant }}-smoke
        run: |
          ACTUAL_VERSION="$("$BINARY_PATH" --version)"
          case "$ACTUAL_VERSION" in
            "$EXPECTED_RUNTIME "[0-9]*) ;;
            *)
              echo "expected $EXPECTED_RUNTIME version, got $ACTUAL_VERSION" >&2
              exit 1
              ;;
          esac
          "$BINARY_PATH" --path "$SMOKE_PREFIX" bootstrap
          "$BINARY_PATH" --path "$SMOKE_PREFIX" status
          "$BINARY_PATH" --path "$SMOKE_PREFIX" completion --help | grep -q "Generate and install shell tab completions"
          "$BINARY_PATH" --path "$SMOKE_PREFIX" exec --help | grep -q "Run a command from a conda package without installing it"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: ${{ steps.build.outputs.dist-path }}/*
          retention-days: ${{ inputs['retention-days'] }}
