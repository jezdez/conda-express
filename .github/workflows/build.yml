name: Prepare conda-express binaries

on:
  workflow_dispatch:
    inputs:
      retention-days:
        description: "Number of days to retain build artifacts."
        required: false
        type: number
        default: 7

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.variant }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cx
            embed_bundle: "false"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cx
            embed_bundle: "false"
          - target: x86_64-apple-darwin
            os: macos-15
            variant: cx
            embed_bundle: "false"
          - target: aarch64-apple-darwin
            os: macos-latest
            variant: cx
            embed_bundle: "false"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cx
            embed_bundle: "false"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cxz
            embed_bundle: "true"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cxz
            embed_bundle: "true"
          - target: x86_64-apple-darwin
            os: macos-15
            variant: cxz
            embed_bundle: "true"
          - target: aarch64-apple-darwin
            os: macos-latest
            variant: cxz
            embed_bundle: "true"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cxz
            embed_bundle: "true"

    steps:
      - name: Build ${{ matrix.variant }}
        id: build
        uses: jezdez/conda-ship@0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
        with:
          name: cx
          packages: "python >=3.12, conda >=25.1, conda-rattler-solver, conda-spawn >=0.1.0, conda-completion >=0.2.0, conda-pypi, conda-self, conda-global, conda-workspaces >=0.4.0"
          channels: "conda-forge"
          exclude: "conda-libmamba-solver"
          ref: 0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
          embed-bundle: ${{ matrix.embed_bundle }}
          docs-url: "https://jezdez.github.io/conda-express/"

      - name: Smoke test ${{ matrix.variant }}
        shell: bash
        env:
          BINARY_PATH: ${{ steps.build.outputs.binary-path }}
          SMOKE_PREFIX: ${{ runner.temp }}/${{ matrix.variant }}-smoke
        run: |
          "$BINARY_PATH" --version
          "$BINARY_PATH" bootstrap --prefix "$SMOKE_PREFIX"
          "$BINARY_PATH" status --prefix "$SMOKE_PREFIX"
          "$BINARY_PATH" completion --help | grep -q "Generate and install shell tab completions"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}
          retention-days: ${{ inputs['retention-days'] }}
