name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - "docs/**"
      - "scripts/**"
      - "Formula/**"
      - "docker/**"
      - "README.md"
      - "DESIGN.md"
      - "PLAN.md"
      - "pyproject.toml"
      - "pixi.lock"
  pull_request:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - "docs/**"
      - "scripts/**"
      - "Formula/**"
      - "docker/**"
      - "README.md"
      - "DESIGN.md"
      - "PLAN.md"
      - "pyproject.toml"
      - "pixi.lock"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-cx-action:
    name: Setup cx action
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read # Required for setup-cx to verify release binary attestations.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up cx without attestation
        id: setup-cx-default
        uses: ./.github/actions/setup-cx
        with:
          version: 26.5.2.post2
      - name: Smoke test default action path
        shell: bash
        env:
          CX_PATH: ${{ steps.setup-cx-default.outputs.cx-path }}
          EXPECTED_VERSION: ${{ steps.setup-cx-default.outputs.version }}
        run: |
          set -euo pipefail
          if [ "$EXPECTED_VERSION" != "26.5.2.post2" ]; then
            echo "expected resolved version 26.5.2.post2, got ${EXPECTED_VERSION}" >&2
            exit 1
          fi
          "$CX_PATH" --version | grep -Fx "cx ${EXPECTED_VERSION}"
          cx --version | grep -Fx "cx ${EXPECTED_VERSION}"
          cx status

      - name: Set up cx with attestation
        id: setup-cx-attested
        uses: ./.github/actions/setup-cx
        with:
          version: 26.5.2.post2
          github-token: ${{ github.token }}
          verify-attestation: true
          add-to-path: false
          bootstrap: false
      - name: Smoke test attestation path
        shell: bash
        env:
          CX_PATH: ${{ steps.setup-cx-attested.outputs.cx-path }}
          EXPECTED_VERSION: ${{ steps.setup-cx-attested.outputs.version }}
        run: |
          set -euo pipefail
          if [ "$EXPECTED_VERSION" != "26.5.2.post2" ]; then
            echo "expected resolved version 26.5.2.post2, got ${EXPECTED_VERSION}" >&2
            exit 1
          fi
          "$CX_PATH" --version | grep -Fx "cx ${EXPECTED_VERSION}"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: docs
          cache: true
      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.load_file(path); puts "ok #{path}" }'
      - name: Build docs
        run: pixi run -e docs docs

  build:
    name: Build ${{ matrix.variant }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cx
            layout: online
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cx
            layout: online
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cx
            layout: online
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cx
            layout: online
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cx
            layout: online
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cxz
            layout: embedded
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cxz
            layout: embedded
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cxz
            layout: embedded
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cxz
            layout: embedded
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cxz
            layout: embedded

    steps:
      - name: Verify matrix target
        shell: bash
        env:
          RUNNER_ARCH_NAME: ${{ runner.arch }}
          RUNNER_OS_NAME: ${{ runner.os }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          case "${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" in
            Linux/X64) host="x86_64-unknown-linux-gnu" ;;
            Linux/ARM64) host="aarch64-unknown-linux-gnu" ;;
            macOS/X64) host="x86_64-apple-darwin" ;;
            macOS/ARM64) host="aarch64-apple-darwin" ;;
            Windows/X64) host="x86_64-pc-windows-msvc" ;;
            *)
              echo "Unsupported runner platform: ${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" >&2
              exit 1
              ;;
          esac
          if [ "$host" != "$TARGET" ]; then
            echo "Expected matrix target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build ${{ matrix.variant }}
        id: build
        uses: jezdez/conda-ship@0.3.0 # zizmor: ignore[unpinned-uses] conda-ship immutable releases keep the action and assets aligned.
        with:
          layout: ${{ matrix.layout }}

      - name: Smoke test ${{ matrix.variant }}
        shell: bash
        env:
          BINARY_PATH: ${{ steps.build.outputs.binary-path }}
          EXPECTED_RUNTIME: ${{ matrix.variant }}
          SMOKE_PREFIX: ${{ runner.temp }}/${{ matrix.variant }}-smoke
        run: |
          ACTUAL_VERSION="$("$BINARY_PATH" --version)"
          case "$ACTUAL_VERSION" in
            "$EXPECTED_RUNTIME "[0-9]*) ;;
            *)
              echo "expected $EXPECTED_RUNTIME version, got $ACTUAL_VERSION" >&2
              exit 1
              ;;
          esac
          "$BINARY_PATH" --path "$SMOKE_PREFIX" bootstrap
          "$BINARY_PATH" --path "$SMOKE_PREFIX" status
          "$BINARY_PATH" --path "$SMOKE_PREFIX" completion --help | grep -q "Generate and install shell tab completions"

      - name: Upload canary binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: ${{ steps.build.outputs.dist-path }}/*
          retention-days: 3
