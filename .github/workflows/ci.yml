name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/build.yml"
      - "docs/**"
      - "scripts/**"
      - "Formula/**"
      - "docker/**"
      - "README.md"
      - "DESIGN.md"
      - "PLAN.md"
      - "pyproject.toml"
      - "pixi.lock"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/build.yml"
      - "docs/**"
      - "scripts/**"
      - "Formula/**"
      - "docker/**"
      - "README.md"
      - "DESIGN.md"
      - "PLAN.md"
      - "pyproject.toml"
      - "pixi.lock"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: docs
          cache: true
      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.load_file(path); puts "ok #{path}" }'
      - name: Build docs
        run: pixi run -e docs docs

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build cx
        id: build
        uses: jezdez/conda-pronto@0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
        with:
          name: cx
          packages: "python >=3.12, conda >=25.1, conda-rattler-solver, conda-spawn >=0.1.0, conda-completion >=0.2.0, conda-pypi, conda-self, conda-global, conda-workspaces >=0.4.0"
          channels: "conda-forge"
          exclude: "conda-libmamba-solver"
          ref: 0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
          embed-bundle: "false"
          docs-url: "https://jezdez.github.io/conda-express/"

      - name: Smoke test
        shell: bash
        run: |
          "${{ steps.build.outputs.binary-path }}" bootstrap --prefix "$RUNNER_TEMP/cx-smoke"
          "${{ steps.build.outputs.binary-path }}" status --prefix "$RUNNER_TEMP/cx-smoke"

      - name: Upload canary binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}
          retention-days: 3

  embedded:
    name: Build cxz (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build cxz
        id: build
        uses: jezdez/conda-pronto@0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
        with:
          name: cx
          packages: "python >=3.12, conda >=25.1, conda-rattler-solver, conda-spawn >=0.1.0, conda-completion >=0.2.0, conda-pypi, conda-self, conda-global, conda-workspaces >=0.4.0"
          channels: "conda-forge"
          exclude: "conda-libmamba-solver"
          ref: 0aa1341649c1b1fddea3ac9b30c6dc0c39dc7b06
          embed-bundle: "true"
          docs-url: "https://jezdez.github.io/conda-express/"

      - name: Smoke test cxz
        shell: bash
        run: |
          "${{ steps.build.outputs.binary-path }}" bootstrap --prefix "$RUNNER_TEMP/cxz-smoke"
          "${{ steps.build.outputs.binary-path }}" status --prefix "$RUNNER_TEMP/cxz-smoke"

      - name: Upload canary binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: |
            ${{ steps.build.outputs.binary-path }}
            ${{ steps.build.outputs.info-path }}
            ${{ steps.build.outputs.lock-path }}
            ${{ steps.build.outputs.package-list-path }}
            ${{ steps.build.outputs.checksums-path }}
          retention-days: 3
