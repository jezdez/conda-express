name: CI

on:
  workflow_dispatch:
    inputs:
      retention-days:
        description: "Number of days to retain build artifacts."
        required: false
        type: number
        default: 7
  push:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - "docs/**"
      - "scripts/**"
      - "Formula/**"
      - "docker/**"
      - "README.md"
      - "DESIGN.md"
      - "PLAN.md"
      - "pyproject.toml"
      - "pixi.lock"
      - "runtime.condarc"
  pull_request:
    branches: [main]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - "docs/**"
      - "scripts/**"
      - "Formula/**"
      - "docker/**"
      - "README.md"
      - "DESIGN.md"
      - "PLAN.md"
      - "pyproject.toml"
      - "pixi.lock"
      - "runtime.condarc"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-cx-action:
    name: Setup cx action
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read # Required for setup-cx to verify release binary attestations.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up cx without attestation
        id: setup-cx-default
        uses: ./.github/actions/setup-cx
        env:
          HOME: ${{ runner.temp }}/setup-cx-default-home
          CX_PREFIX: ${{ runner.temp }}/setup-cx-default-home/.conda/express
        with:
          version: 26.5.2.post2
      - name: Smoke test default action path
        shell: bash
        env:
          CX_PATH: ${{ steps.setup-cx-default.outputs.cx-path }}
          CX_PREFIX: ${{ runner.temp }}/setup-cx-default-home/.conda/express
          EXPECTED_VERSION: ${{ steps.setup-cx-default.outputs.version }}
          HOME: ${{ runner.temp }}/setup-cx-default-home
        run: |
          set -euo pipefail
          if [ "$EXPECTED_VERSION" != "26.5.2.post2" ]; then
            echo "expected resolved version 26.5.2.post2, got ${EXPECTED_VERSION}" >&2
            exit 1
          fi
          "$CX_PATH" info --json > "$RUNNER_TEMP/setup-cx-info.json"
          jq -e \
            --arg prefix "$CX_PREFIX" \
            '.root_prefix == $prefix and .conda_version == "26.5.2"' \
            "$RUNNER_TEMP/setup-cx-info.json"
          cx info --json > /dev/null

      - name: Set up cx with attestation
        id: setup-cx-attested
        uses: ./.github/actions/setup-cx
        env:
          HOME: ${{ runner.temp }}/setup-cx-no-bootstrap-home
          CX_PREFIX: ${{ runner.temp }}/setup-cx-no-bootstrap-home/.conda/express
        with:
          version: 26.5.2.post2
          github-token: ${{ github.token }}
          verify-attestation: true
          add-to-path: false
          bootstrap: false
      - name: Smoke test attestation path
        shell: bash
        env:
          CX_PATH: ${{ steps.setup-cx-attested.outputs.cx-path }}
          CX_PREFIX: ${{ runner.temp }}/setup-cx-no-bootstrap-home/.conda/express
          EXPECTED_VERSION: ${{ steps.setup-cx-attested.outputs.version }}
        run: |
          set -euo pipefail
          if [ "$EXPECTED_VERSION" != "26.5.2.post2" ]; then
            echo "expected resolved version 26.5.2.post2, got ${EXPECTED_VERSION}" >&2
            exit 1
          fi
          test -x "$CX_PATH"
          test ! -e "$CX_PREFIX"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: docs
          cache: true
      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].each { |path| YAML.load_file(path); puts "ok #{path}" }'
      - name: Build docs
        run: pixi run -e docs docs

  build:
    name: Build ${{ matrix.variant }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: read # Required for conda-ship to verify release binary attestations.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cx
            artifact_layout: online
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cx
            artifact_layout: online
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cx
            artifact_layout: online
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cx
            artifact_layout: online
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cx
            artifact_layout: online
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: cxz
            artifact_layout: embedded
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: cxz
            artifact_layout: embedded
          - target: x86_64-apple-darwin
            os: macos-15-intel
            variant: cxz
            artifact_layout: embedded
          - target: aarch64-apple-darwin
            os: macos-15
            variant: cxz
            artifact_layout: embedded
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: cxz
            artifact_layout: embedded

    steps:
      - name: Verify matrix target
        shell: bash
        env:
          RUNNER_ARCH_NAME: ${{ runner.arch }}
          RUNNER_OS_NAME: ${{ runner.os }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          case "${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" in
            Linux/X64) host="x86_64-unknown-linux-gnu" ;;
            Linux/ARM64) host="aarch64-unknown-linux-gnu" ;;
            macOS/X64) host="x86_64-apple-darwin" ;;
            macOS/ARM64) host="aarch64-apple-darwin" ;;
            Windows/X64) host="x86_64-pc-windows-msvc" ;;
            *)
              echo "Unsupported runner platform: ${RUNNER_OS_NAME}/${RUNNER_ARCH_NAME}" >&2
              exit 1
              ;;
          esac
          if [ "$host" != "$TARGET" ]; then
            echo "Expected matrix target ${TARGET}, got ${host}" >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build ${{ matrix.variant }}
        id: build
        uses: jezdez/conda-ship@aed7e6a73ecd52edea066ba2e5fc625dea246396 # 0.5.0
        with:
          conda-ship-version: "0.5.0"
          artifact-layout: ${{ matrix.artifact_layout }}
          artifact-name: ${{ matrix.variant }}

      - name: Smoke test ${{ matrix.variant }}
        shell: bash
        env:
          BINARY_PATH: ${{ steps.build.outputs.binary-path }}
          CX_PREFIX: ${{ runner.temp }}/${{ matrix.variant }}-smoke
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail

          "$BINARY_PATH" info --json > /dev/null
          "$BINARY_PATH" --version | grep -Fx "conda 26.5.2"
          cmp runtime.condarc "$CX_PREFIX/.condarc"
          test -f "$CX_PREFIX/conda-meta/frozen"
          "$BINARY_PATH" completion --help | grep -q "Generate and install shell tab completions"
          completion_cache="${RUNNER_TEMP}/${VARIANT}-completion-cache"
          "$BINARY_PATH" completion \
            --cache-dir "$completion_cache" \
            generate \
            --no-repodata
          "$BINARY_PATH" completion \
            --cache-dir "$completion_cache" \
            init bash \
            --command-name cx | grep -F "_conda_completion_command='cx'"
          "$BINARY_PATH" exec --help | grep -q "Run a command from a conda package without installing it"

      - name: Upload canary binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.build.outputs.asset-name }}
          path: ${{ steps.build.outputs.dist-path }}/*
          retention-days: ${{ inputs['retention-days'] || 3 }}
