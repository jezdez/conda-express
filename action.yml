name: "Build cx (conda-express)"
description: >
  Build the conda-express cx distribution binary with Pronto. Runs on the
  current runner; use a matrix strategy for multi-platform builds.
branding:
  icon: package
  color: green

inputs:
  packages:
    description: >
      Comma-separated conda package specs to include in cx. When empty, uses the
      conda-express distribution package set.
    required: false
    default: ""
  channels:
    description: >
      Comma-separated conda channels. When empty, uses the conda-express default
      channel set.
    required: false
    default: ""
  exclude:
    description: >
      Comma-separated packages to exclude along with their exclusive
      dependencies. When empty, uses the conda-express default exclusions.
    required: false
    default: ""
  pronto-ref:
    description: "Git ref of Pronto to use for the build."
    required: false
    default: "f705d0b2a5c180a3381692d6cb6715196af738b4"
  embed-bundle:
    description: >
      Embed package archives into the binary for offline bootstrap. The output
      binary uses the cxz artifact name.
    required: false
    default: "false"

outputs:
  binary-path:
    description: "Absolute path to the built cx or cxz binary."
    value: ${{ steps.build.outputs.binary-path }}
  asset-name:
    description: "Platform-qualified asset name, such as cx-aarch64-apple-darwin."
    value: ${{ steps.build.outputs.asset-name }}
  info-path:
    description: "Absolute path to the artifact info JSON."
    value: ${{ steps.build.outputs.info-path }}
  lock-path:
    description: "Absolute path to the staged runtime lock."
    value: ${{ steps.build.outputs.lock-path }}
  package-list-path:
    description: "Absolute path to the package list."
    value: ${{ steps.build.outputs.package-list-path }}
  checksums-path:
    description: "Absolute path to the SHA256 checksum file."
    value: ${{ steps.build.outputs.checksums-path }}

runs:
  using: composite
  steps:
    - name: Resolve conda-express distribution inputs
      id: config
      shell: bash
      env:
        INPUT_PACKAGES: ${{ inputs.packages }}
        INPUT_CHANNELS: ${{ inputs.channels }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
      run: |
        DEFAULT_PACKAGES="python >=3.12, conda >=25.1, conda-rattler-solver, conda-spawn >=0.1.0, conda-pypi, conda-self, conda-global, conda-workspaces >=0.4.0"
        DEFAULT_CHANNELS="conda-forge"
        DEFAULT_EXCLUDE="conda-libmamba-solver"

        packages="$INPUT_PACKAGES"
        channels="$INPUT_CHANNELS"
        exclude="$INPUT_EXCLUDE"

        if [[ -z "$packages" ]]; then
          packages="$DEFAULT_PACKAGES"
        fi
        if [[ -z "$channels" ]]; then
          channels="$DEFAULT_CHANNELS"
        fi
        if [[ -z "$exclude" ]]; then
          exclude="$DEFAULT_EXCLUDE"
        fi

        echo "packages=${packages}" >> "$GITHUB_OUTPUT"
        echo "channels=${channels}" >> "$GITHUB_OUTPUT"
        echo "exclude=${exclude}" >> "$GITHUB_OUTPUT"

    - name: Build cx with Pronto
      id: build
      uses: jezdez/pronto@f705d0b2a5c180a3381692d6cb6715196af738b4
      with:
        name: cx
        packages: ${{ steps.config.outputs.packages }}
        channels: ${{ steps.config.outputs.channels }}
        exclude: ${{ steps.config.outputs.exclude }}
        ref: ${{ inputs.pronto-ref }}
        embed-bundle: ${{ inputs.embed-bundle }}
        docs-url: "https://jezdez.github.io/conda-express/"
